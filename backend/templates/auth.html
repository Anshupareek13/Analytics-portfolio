<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #230a59;
            overflow: hidden;
            color: white;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(90, 30, 160, 0.35) 0%, transparent 25%),
                radial-gradient(circle at 80% 25%, rgba(60, 20, 120, 0.35) 0%, transparent 25%),
                radial-gradient(circle at 70% 75%, rgba(120, 40, 200, 0.25) 0%, transparent 30%),
                radial-gradient(circle at 15% 80%, rgba(80, 20, 150, 0.25) 0%, transparent 30%);
            z-index: -2;
        }

        .wave-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 10%, transparent 0 55%, rgba(43, 9, 92, 0.85) 56% 62%, transparent 63%),
                radial-gradient(ellipse at 90% 20%, transparent 0 60%, rgba(43, 9, 92, 0.85) 61% 67%, transparent 68%),
                radial-gradient(ellipse at 80% 75%, transparent 0 50%, rgba(43, 9, 92, 0.85) 51% 58%, transparent 59%),
                radial-gradient(ellipse at 25% 65%, transparent 0 58%, rgba(43, 9, 92, 0.85) 59% 65%, transparent 66%);
            z-index: -1;
            opacity: 0.8;
        }

        .auth-wrapper {
            width: 950px;
            max-width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .auth-box {
            background: rgba(255,255,255,0.95);
            color: #111;
            padding: 35px 30px;
            border-radius: 26px;
            box-shadow: 0 18px 38px rgba(0,0,0,0.32);
            text-align: center;
        }

        .auth-box h2 {
            font-size: 42px;
            color: #ff33cc;
            margin-bottom: 22px;
            line-height: 1;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            outline: none;
            background: #f1f1f1;
            font-size: 16px;
        }

        .eye-btn {
            position: absolute;
            right: 14px;
            top: 12px;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff33cc, #b55cff);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(181, 92, 255, 0.35);
        }

        .auth-btn:hover {
            opacity: 0.92;
        }

        .bottom-link {
            margin-top: 14px;
            display: inline-block;
            text-decoration: none;
            color: #230a59;
            font-weight: 700;
        }

        .flash-box {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #111;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            z-index: 10;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .auth-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="wave-bg"></div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-box">
                {{ messages[0] }}
            </div>
        {% endif %}
    {% endwith %}

    <div class="auth-wrapper">
        <div class="auth-box">
            <h2>Login</h2>

            <form method="POST">
                <input type="hidden" name="action" value="login">

                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="password" id="loginPassword" name="password" placeholder="Password" required>
                    <span class="eye-btn" onclick="togglePassword('loginPassword')">👁</span>
                </div>

                <button class="auth-btn" type="submit">Login</button>
            </form>

            <a class="bottom-link" href="/forgot_password">Forgot Password?</a>
        </div>

        <div class="auth-box">
            <h2>Signup</h2>

            <form method="POST">
                <input type="hidden" name="action" value="signup">

                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="password" id="signupPassword" name="password" placeholder="Password" required>
                    <span class="eye-btn" onclick="togglePassword('signupPassword')">👁</span>
                </div>

                <button class="auth-btn" type="submit">Signup</button>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(id) {
            var pass = document.getElementById(id);
            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }
    </script>
</body>
</html>
