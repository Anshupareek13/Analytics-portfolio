<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(140, 91, 255, 0.14), transparent 22%),
                radial-gradient(circle at 80% 25%, rgba(255, 79, 201, 0.12), transparent 24%),
                radial-gradient(circle at 70% 75%, rgba(111, 125, 255, 0.10), transparent 28%);
            z-index: 0;
        }

        .signup-card {
            width: 100%;
            max-width: 420px;
            background: #070707;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 22px;
            padding: 34px 30px 28px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.35);
            position: relative;
            z-index: 1;
        }

        .brand-title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #8c5bff, #ff4fc9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #a6a6a6;
            font-size: 16px;
            margin-bottom: 28px;
        }

        .flash-box {
            margin-bottom: 18px;
            background: rgba(255,255,255,0.06);
            color: #ffffff;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            font-weight: 700;
            text-align: center;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .flash-box.hide {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            height: 48px;
            background: #141414;
            border: 1px solid #353535;
            color: #ffffff;
            padding: 0 14px;
            font-size: 15px;
            outline: none;
            transition: 0.25s ease;
        }

        .form-group input:focus {
            border-color: #7b61ff;
            box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.12);
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 48px;
        }

        .eye-btn {
            position: absolute;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #cfcfcf;
            cursor: pointer;
            font-size: 18px;
        }

        .signup-btn {
            width: 100%;
            height: 48px;
            border: none;
            background: linear-gradient(90deg, #8c5bff, #4f5dff);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.25s ease;
        }

        .signup-btn:hover {
            opacity: 0.92;
        }

        .bottom-text {
            text-align: center;
            margin-top: 18px;
            color: #9f9f9f;
            font-size: 15px;
        }

        .bottom-text a {
            color: #7b61ff;
            text-decoration: none;
            font-weight: 700;
        }

        .bottom-text a:hover {
            color: #9b86ff;
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 28px 20px 24px;
            }

            .brand-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-card">
        <h1 class="brand-title">Analytics Portfolio</h1>
        <p class="subtitle">Create your account</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-box" id="flashMessage">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Name</label>
                <input type="text" id="username" name="username" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="eye-btn" onclick="togglePassword()">👁</button>
                </div>
            </div>

            <button class="signup-btn" type="submit">Create Account</button>
        </form>

        <p class="bottom-text">
            Already have an account?
            <a href="/">Sign In</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const pass = document.getElementById("password");
            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

        const flashMessage = document.getElementById("flashMessage");
        if (flashMessage) {
            setTimeout(() => {
                flashMessage.classList.add("hide");
            }, 5000);
        }
    </script>
</body>
</html>
