<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #050505;
            color: #f5f5f5;
            padding: 40px 20px;
        }

        .page-wrapper {
            max-width: 1150px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #cfcfcf;
            text-decoration: none;
            font-size: 15px;
            transition: 0.25s ease;
        }

        .back-link:hover {
            color: white;
        }

        .profile-badge {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
            flex-shrink: 0;
        }

        .profile-badge img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .password-card {
            background: #070707;
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 22px;
            padding: 34px 34px 30px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
        }

        .password-card h1 {
            font-size: 56px;
            line-height: 1.05;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 20px;
            color: #9d9d9d;
            margin-bottom: 36px;
        }

        .flash-box {
            margin-bottom: 22px;
            background: rgba(255,255,255,0.06);
            color: #ffffff;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            font-weight: 700;
            opacity: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .flash-box.hide {
            opacity: 0;
            transform: translateY(-8px);
            pointer-events: none;
        }

        .form-group {
            margin-bottom: 26px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            height: 58px;
            background: #141414;
            border: 1px solid #353535;
            color: #ffffff;
            padding: 0 52px 0 16px;
            font-size: 17px;
            outline: none;
            transition: 0.25s ease;
        }

        .input-wrap input:focus {
            border-color: #7b61ff;
            box-shadow: 0 0 0 3px rgba(123, 97, 255, 0.12);
        }

        .eye-btn {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: #cfcfcf;
            cursor: pointer;
            font-size: 18px;
        }

        .action-row {
            display: flex;
            gap: 14px;
            margin-top: 18px;
        }

        .primary-btn,
        .secondary-btn {
            height: 54px;
            border: 1px solid transparent;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .primary-btn {
            flex: 1;
            background: linear-gradient(90deg, #8c5bff, #4f5dff);
            color: white;
        }

        .primary-btn:hover {
            opacity: 0.92;
        }

        .secondary-btn {
            width: 150px;
            background: transparent;
            color: white;
            border-color: #353535;
        }

        .secondary-btn:hover {
            background: #111111;
        }

        @media (max-width: 768px) {
            body {
                padding: 22px 14px;
            }

            .password-card {
                padding: 24px 20px 22px;
            }

            .password-card h1 {
                font-size: 40px;
            }

            .subtitle {
                font-size: 17px;
                margin-bottom: 28px;
            }

            .action-row {
                flex-direction: column;
            }

            .secondary-btn {
                width: 100%;
            }

            .profile-badge {
                width: 46px;
                height: 46px;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="top-bar">
            <a href="/dashboard" class="back-link">← Back to Dashboard</a>

            <div class="profile-badge">
                <img src="https://i.pravatar.cc/100?img=12" alt="Profile">
            </div>
        </div>

        <div class="password-card">
            <h1>Change Password</h1>
            <p class="subtitle">Update your password to keep your account secure</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="flash-box" id="flashMessage">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="old_password">Current Password</label>
                    <div class="input-wrap">
                        <input type="password" id="old_password" name="old_password" required>
                        <button type="button" class="eye-btn" onclick="togglePassword('old_password', this)">👁</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <div class="input-wrap">
                        <input type="password" id="new_password" name="new_password" required>
                        <button type="button" class="eye-btn" onclick="togglePassword('new_password', this)">👁</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm New Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirm_password" name="confirm_password" required>
                        <button type="button" class="eye-btn" onclick="togglePassword('confirm_password', this)">👁</button>
                    </div>
                </div>

                <div class="action-row">
                    <button type="submit" class="primary-btn">Change Password</button>
                    <button type="button" class="secondary-btn" onclick="window.location.href='/dashboard'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "🙈";
            } else {
                input.type = "password";
                btn.textContent = "👁";
            }
        }

        const flashMessage = document.getElementById("flashMessage");
        if (flashMessage) {
            setTimeout(() => {
                flashMessage.classList.add("hide");
            }, 5000);
        }
    </script>
</body>
</html>
